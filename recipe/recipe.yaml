schema_version: 1

context:
  name: google-cloud-workflows
  version: "1.21.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_cloud_workflows-${{ version }}.tar.gz
  sha256: 19a33f7f2209487274afff1ccf668360619d216c3e2d78269e54452aebfb7b62

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    # more restrictive constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # more restrictive constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.workflows
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: Google Cloud Workflows API client library
  license: Apache-2.0
  license_file: LICENSE
  description: |
    Cloud Workflows API: Orchestrate and automateGoogle Cloud and HTTP-based
    API services with serverless workflows.
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-workflows
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-workflows
  documentation: https://googleapis.dev/python/workflows/latest/index.html

extra:
  recipe-maintainers:
    - xylar
    - parthea
